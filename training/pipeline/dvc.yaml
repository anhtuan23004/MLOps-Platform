vars:
  - params.yaml

stages:
  prepare_data:
    cmd: python -m llm_local.pipeline.stages.prepare_data
    deps:
      - ../../llm_local/pipeline/stages/prepare_data.py
      - ../../llm_local/pipeline/stages/common.py
      - params.yaml
    params:
      - dataset.source
      - dataset.version_tag
    outs:
      - data/processed/dataset_manifest.json

  train:
    cmd: python -m llm_local.pipeline.stages.train
    deps:
      - ../../llm_local/pipeline/stages/train.py
      - ../../llm_local/pipeline/stages/common.py
      - data/processed/dataset_manifest.json
      - params.yaml
    params:
      - model.name
      - model.base_model
      - train.epochs
      - train.learning_rate
      - train.dry_run
    outs:
      - models/artifacts/run_manifest.json

  evaluate:
    cmd: python -m llm_local.pipeline.stages.evaluate
    deps:
      - ../../llm_local/pipeline/stages/evaluate.py
      - ../../llm_local/pipeline/stages/common.py
      - models/artifacts/run_manifest.json
      - params.yaml
    params:
      - evaluate.min_accuracy
    outs:
      - evaluation/results/ct_eval_report.json

  register:
    cmd: python -m llm_local.pipeline.stages.register
    deps:
      - ../../llm_local/pipeline/stages/register.py
      - ../../llm_local/pipeline/stages/common.py
      - evaluation/results/ct_eval_report.json
      - models/artifacts/run_manifest.json
      - params.yaml
    params:
      - register.release_prefix
    outs:
      - data/pipeline/release_pointer.json
