services:
  mlflow:
    image: dhi.io/mlflow:3
    command:
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - ${MLFLOW_BACKEND_STORE_URI:-file:///mlflow-data/mlruns}
      - --artifacts-destination
      - ${MLFLOW_ARTIFACT_ROOT}
      - --serve-artifacts
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-}
      MLFLOW_S3_BUCKET: ${MLFLOW_S3_BUCKET:-mlops-platform}
      MLFLOW_S3_IGNORE_TLS: ${MLFLOW_S3_IGNORE_TLS:-false}
    ports:
      - "${MLFLOW_HOST_PORT:-15000}:5000"
    networks:
      - llm-net
    restart: unless-stopped

networks:
  llm-net:
    external: true
