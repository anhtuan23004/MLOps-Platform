global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm:8000"]

  - job_name: litellm
    metrics_path: /metrics/
    static_configs:
      - targets: ["litellm:4000"]

  - job_name: nvidia-gpu
    static_configs:
      - targets: ["nvidia-gpu-exporter:9835"]
