services:
  observation:
    build: .
    container_name: observation
    profiles:
      - batch
    volumes:
      - ./scripts:/app/scripts
      - ./dashboards:/app/dashboards
      - ../evaluation/results:/app/results
    networks:
      - llm-net

  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG:-latest}
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-18093}:9090"
    networks:
      - llm-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:${GRAFANA_IMAGE_TAG:-latest}
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "${GRAFANA_ANONYMOUS_ENABLED:-true}"
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GRAFANA_ANONYMOUS_ORG_ROLE:-Viewer}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-18094}:3000"
    depends_on:
      - prometheus
    networks:
      - llm-net
    restart: unless-stopped

  nvidia-gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:${GPU_EXPORTER_IMAGE_TAG:-latest}
    container_name: nvidia-gpu-exporter
    profiles:
      - gpu
    devices:
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia0:/dev/nvidia0
    volumes:
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
    ports:
      - "${GPU_EXPORTER_HOST_PORT:-9835}:9835"
    networks:
      - llm-net
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  llm-net:
    external: true
