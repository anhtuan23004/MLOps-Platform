dataset:
  source: data/raw
  version_tag: v1

model:
  name: mlops-ct-model
  base_model: local/TinyLlama-1.1B-Chat-v1.0

train:
  epochs: 1
  learning_rate: 0.0002
  dry_run: true
  adapter_type: lora
  max_seq_length: 2048
  batch_size: 2
  lora_r: 16
  lora_alpha: 16
  experiment: mlops-platform-continuous-training
  unsloth:
    container: unsloth
    script: /workspace/scripts/finetune_lora.py
    container_output_dir: /workspace/pipeline/models/artifacts/staging

evaluate:
  min_accuracy: 0.0

register:
  release_prefix: rel-ct
