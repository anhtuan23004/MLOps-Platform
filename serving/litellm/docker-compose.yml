services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:${LITELLM_IMAGE_TAG:-latest}
    container_name: litellm
    command: ["--config", "/app/config.yaml", "--port", "${CONTAINER_PORT:-4000}"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-litellm}
      VLLM_API_BASE: ${VLLM_API_BASE:-http://vllm:8000/v1}
      VLLM_API_KEY: ${VLLM_API_KEY:-sk-local-vllm}
      VLLM_LITELLM_MODEL: ${VLLM_LITELLM_MODEL:-openai/local/sample-chat-small}
    ports:
      - "${HOST_PORT:-18040}:${CONTAINER_PORT:-4000}"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - llm-net
    restart: unless-stopped

networks:
  llm-net:
    external: true
